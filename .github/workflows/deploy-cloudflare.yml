name: Deploy to Cloudflare Pages

# Manual-only for now (workflow_dispatch) — switch to `push: branches: [main]`
# once CLOUDFLARE_API_TOKEN/CLOUDFLARE_ACCOUNT_ID secrets are set and a manual
# run has confirmed the domain + deploy work end to end. At that point also
# delete deploy.yml (the old GitHub Pages workflow) to avoid deploying twice.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=math-dojo --branch=main
